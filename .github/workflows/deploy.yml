# .github/workflows/deploy.yml – pattern (II), self-hosted Jetson runner
# Triggers: push of v*.*.* tag (annotated)
# Jobs: deploy (with production environment + approval gate)
name: Deploy

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    environment:
      name: production
      url: >-
        https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR (so deploy.sh's docker pull works)
        # The Jetson's interactive sessions periodically docker-login by
        # hand, but the runner's exec env is a fresh shell without that
        # cached credential. Re-authenticate per run.
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx (for imagetools)
        uses: docker/setup-buildx-action@v4

      - name: Re-tag the SHA image as semver (no rebuild)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SRC="ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}"
          MAJ="${TAG%%.*}"; MIN="${TAG%.*}"
          for NEW in "$TAG" "$MIN" "$MAJ" "latest"; do
            IMG_BASE="ghcr.io/${{ github.repository }}"
            docker buildx imagetools create -t "$IMG_BASE:${NEW}" "$SRC"
          done

      - name: Run deploy.sh on this Jetson
        # Runner lives on the Jetson, so deploy.sh runs locally – no SSH.
        # nvpmodel + jetson_clocks have NOPASSWD sudo (Step 0.0); STATE_DIR
        # was chowned to the runner user (D5); GHCR is logged in above.
        env:
          DEPLOY_ENV: production
        run: |
          chmod +x deploy/deploy.sh deploy/healthcheck.sh
          bash deploy/deploy.sh "${{ github.ref_name }}"
